]
# Propagated to consumers: upstream headers, the macros side header, and the
# single consumer-visible generated header (gen/public/libavutil/avconfig.h,
# identical across supported targets). Target-private config snapshots are
# added per target below.
include_dirs = [
  "gen/public",
  "gen/linux-x86_64",
  "gen/linux-x86_64/libavcodec",
  "gen/linux-x86_64/libavformat",
  "gen/linux-x86_64/libavfilter",
  "gen/linux-x86_64/libavdevice",
  "third_party/ffmpeg",
  "include",
]
# The exact defines FFmpeg's own build uses (ffbuild/config.mak CPPFLAGS) plus
# HAVE_AV_CONFIG_H, which every FFmpeg TU is compiled with.
cflags = [
  "-DHAVE_AV_CONFIG_H",
  "-D_ISOC11_SOURCE", "-D_FILE_OFFSET_BITS=64", "-D_LARGEFILE_SOURCE",
  "-D_POSIX_C_SOURCE=200112", "-D_XOPEN_SOURCE=600", "-DPIC",
  "-fomit-frame-pointer", "-fno-math-errno", "-fno-signed-zeros",
  "-pthread",
]
# FFmpeg's own CXXFLAGS carry this; common.h #errors without it in C++ TUs.
cxxflags = ["-D__STDC_CONSTANT_MACROS"]
ldflags = ["-lpthread", "-lm"]
flags = [
  # Vendored code builds silently; the module wrapper layer keeps warnings.
  { glob = "third_party/ffmpeg/**", cflags = ["-w"] },
  # Upstream compiles sub-Makefile objects (libavcodec/{aac,bsf,hevc,opus,vvc})
  # with -I<their library root>; BUILDING_<lib> matches ffbuild/library.mak.
  { glob = "third_party/ffmpeg/libavcodec/aac/**", cflags = ["-Ithird_party/ffmpeg/libavcodec"] },
  { glob = "third_party/ffmpeg/libavcodec/bsf/**", cflags = ["-Ithird_party/ffmpeg/libavcodec"] },
  { glob = "third_party/ffmpeg/libavcodec/hevc/**", cflags = ["-Ithird_party/ffmpeg/libavcodec"] },
  { glob = "third_party/ffmpeg/libavcodec/opus/**", cflags = ["-Ithird_party/ffmpeg/libavcodec"] },
  { glob = "third_party/ffmpeg/libavcodec/vvc/**", cflags = ["-Ithird_party/ffmpeg/libavcodec"] },
  { glob = "third_party/ffmpeg/libavutil/**", defines = ["BUILDING_avutil"] },
  { glob = "third_party/ffmpeg/libavcodec/**", defines = ["BUILDING_avcodec"] },
  { glob = "third_party/ffmpeg/libavformat/**", defines = ["BUILDING_avformat"] },
  { glob = "third_party/ffmpeg/libavfilter/**", defines = ["BUILDING_avfilter"] },
  { glob = "third_party/ffmpeg/libavdevice/**", defines = ["BUILDING_avdevice"] },
  { glob = "third_party/ffmpeg/libswscale/**", defines = ["BUILDING_swscale"] },
  { glob = "third_party/ffmpeg/libswresample/**", defines = ["BUILDING_swresample"] },
  # NASM does no file-relative include search: list every needed -I explicitly
  # (trailing slashes are load-bearing) and pre-include the config snapshot.
  # .asm units exist only in x86 target blocks, so this entry is inert
  # elsewhere.
  { glob = "third_party/ffmpeg/**/*.asm", asmflags = ["-Igen/linux-x86_64/", "-Ithird_party/ffmpeg/", "-Ithird_party/ffmpeg/libavcodec/x86/", "-Ithird_party/ffmpeg/libavutil/x86/", "-Ithird_party/ffmpeg/libavfilter/x86/", "-Ithird_party/ffmpeg/libswscale/x86/", "-Ithird_party/ffmpeg/libswresample/x86/", "-Pconfig.asm"] },
]

