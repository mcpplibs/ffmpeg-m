[package]
name        = "ffmpeg"
version     = "0.0.1"
description = "FFmpeg (n8.1.2) built from source by mcpp, exposed as C++ modules (import ffmpeg.av;)"
license     = "LGPL-2.1-or-later"
repo        = "https://github.com/mcpplibs/ffmpeg-m"
platforms   = ["linux", "macos"]

[targets.ffmpeg]
kind = "lib"

[build]
c_standard = "c17"
# Platform-independent sources: the module wrapper layer. FFmpeg's own source
# list is target-specific (x86 NASM vs aarch64 GAS) and lives in the generated
# [target.'cfg(...)'.build] blocks at the end of this file.
