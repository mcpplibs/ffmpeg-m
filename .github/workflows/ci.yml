name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: mcpp (ubuntu-latest, required)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # mcpp resolves nasm PATH-first; ubuntu-24.04 ships nasm >= 2.16.
      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm && nasm --version

      - name: Install Xlings
        env:
          XLINGS_NON_INTERACTIVE: 1
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/refs/heads/main/tools/other/quick_install.sh | bash
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Install project tools
        run: |
          xlings update
          xlings install

      # Same transition step as imgui-m: pin the glibc gcc toolchain explicitly
      # until mcpp's bootstrap default settles.
      - name: Set default toolchain
        run: |
          mcpp toolchain install gcc 16.1.0
          mcpp toolchain default gcc@16.1.0
          mcpp --version

      # TEMPORARY (until mcpp-index#74 is merged and the index artifact is
      # republished): resolve compat.ffmpeg from a checkout of mcpp-index.
      # Remove this step + the [indices] injection once published.
      - name: Bridge compat index (pre-publication)
        run: |
          git clone --depth 1 https://github.com/mcpplibs/mcpp-index /tmp/mcpp-index
          if [ ! -f /tmp/mcpp-index/pkgs/c/compat.ffmpeg.lua ]; then
            git -C /tmp/mcpp-index fetch --depth 1 origin feat/add-compat-ffmpeg
            git -C /tmp/mcpp-index checkout FETCH_HEAD
          fi
          for f in mcpp.toml examples/probe/mcpp.toml examples/decode_frames/mcpp.toml; do
            printf '\n[indices]\ncompat = { path = "/tmp/mcpp-index" }\n' >> "$f"
          done

      - name: Build library (via compat.ffmpeg source build)
        run: mcpp build

      - name: Run tests (API surface + encode/decode roundtrip)
        run: mcpp test

      - name: Run probe example (path-dep consumer)
        run: |
          cd examples/probe
          mcpp run

      - name: Build decode_frames example
        run: |
          cd examples/decode_frames
          mcpp build

  macos-snapshot:
    # macOS package support is blocked on mcpp#229 (dependency cfg-conditional
    # sources) + a macos descriptor profile. Until then this job smoke-tests
    # the packaging machinery on macOS: official-tarball fetch + hermetic
    # configure + make -n source derivation.
    name: snapshot (macos-latest, experimental)
    runs-on: macos-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream + hermetic configure + source derivation
        run: |
          src="$(sh tools/fetch_upstream.sh)"
          bld="$(mktemp -d)"
          cd "$bld"
          "$src/configure" --cc=clang --disable-autodetect --disable-programs --disable-doc
          make -n > make-n.log 2>/dev/null || true
          n=$(grep -cE '\.(c|S|asm)\b' make-n.log || true)
          echo "derived compile lines: $n"
          test "$n" -gt 1500
